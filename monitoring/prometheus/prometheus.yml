global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "doc-llm-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        # Docker Compose 預設會解析服務名稱 backend，如果是外部執行需用 host.docker.internal:8000
